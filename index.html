<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>*INCOGNITOUP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0e0e;
  --card:#181818;
  --card2:#1e1e1e;
  --line:#262626;
  --line2:#303030;
  --text:#f0f0f0;
  --sub:#666;
  --dim:#3a3a3a;
  --red:#c42828;
  --red-s:#1f0808;
  --ff:'Bebas Neue',sans-serif;
  --fb:'DM Sans',sans-serif;
  --fm:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* SCREENS */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .34s cubic-bezier(.25,1,.5,1);overflow:hidden;will-change:transform}
.scr.active{transform:translateX(0)}
.scr.out{transform:translateX(-30%);transition:transform .34s cubic-bezier(.25,1,.5,1)}

/* HOME */
#s-home{transform:translateX(0)}
.home-scroll{flex:1;overflow-y:auto}
.home-scroll::-webkit-scrollbar{display:none}
.home-nav{padding:54px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.home-mark{font-family:var(--ff);font-size:clamp(42px,12vw,64px);letter-spacing:.04em;color:var(--text);line-height:.88}
.home-mark .ast{color:var(--red)}
.home-mark-sub{font-size:11px;font-weight:300;font-style:italic;color:var(--sub);margin-top:10px;letter-spacing:.02em}
.menu-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;margin-top:6px}
.menu-btn span{display:block;width:14px;height:1.5px;background:var(--sub);border-radius:1px}

/* STRIP */
.meta-strip{display:flex;gap:0;margin:28px 24px 0;border:1px solid var(--line);overflow:hidden}
.meta-item{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;border-right:1px solid var(--line)}
.meta-item:last-child{border-right:none}
.meta-n{font-family:var(--ff);font-size:22px;letter-spacing:.03em;color:var(--text);line-height:1}
.meta-l{font-family:var(--fm);font-size:8px;letter-spacing:.15em;color:var(--sub);text-transform:uppercase}

/* SECTION */
.sec{padding:28px 24px 14px;display:flex;align-items:center;justify-content:space-between}
.sec-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--sub)}
.sec-link{font-size:11px;font-weight:600;color:var(--red);cursor:pointer}

/* SYSTEM CARDS horizontal */
.hscroll{overflow-x:auto;padding:0 24px 4px;display:flex;gap:10px}
.hscroll::-webkit-scrollbar{display:none}
.sys-card{flex-shrink:0;width:140px;background:var(--card);border:1px solid var(--line);cursor:pointer;transition:border-color .15s;overflow:hidden}
.sys-card:active{border-color:var(--red)}
.sys-card-img{height:90px;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.sys-card-letter{font-family:var(--ff);font-size:52px;color:var(--line2)}
.sys-badge{position:absolute;top:7px;left:7px;background:var(--red);padding:2px 6px;font-family:var(--fm);font-size:8px;letter-spacing:.1em;color:#fff;text-transform:uppercase}
.sys-card-body{padding:10px 12px}
.sys-cname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sys-cprice{font-family:var(--fm);font-size:10px;color:var(--red)}

/* BARBER ROWS */
.b-row{margin:0 24px 8px;background:var(--card);border:1px solid var(--line);padding:14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.b-row:active{border-color:var(--red)}
.b-av{width:44px;height:44px;background:var(--card2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:16px;color:var(--sub);flex-shrink:0}
.b-info{flex:1}
.b-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.b-meta{font-size:11px;color:var(--sub)}
.b-rat{font-size:11px;font-weight:700;color:var(--text);flex-shrink:0;text-align:right}
.b-rat .star{color:var(--red);font-size:11px}

.home-bottom{padding:20px 24px 40px}
.book-btn{width:100%;background:var(--red);border:none;padding:17px 24px;font-family:var(--ff);font-size:22px;letter-spacing:.1em;color:#fff;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:space-between}
.book-btn:active{opacity:.8}
.book-btn svg{width:18px;height:18px;stroke:#fff}

/* ===== BOTTOM SHEET ===== */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--card);z-index:51;transition:transform .38s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;max-height:92dvh}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:3px;background:var(--dim);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.sheet-head{padding:16px 22px 14px;flex-shrink:0;border-bottom:1px solid var(--line)}
.sheet-eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.sheet-title{font-family:var(--ff);font-size:clamp(28px,8vw,38px);letter-spacing:.03em;color:var(--text);line-height:.92}
.sheet-body{flex:1;overflow-y:auto;padding:14px 22px 10px}
.sheet-body::-webkit-scrollbar{display:none}
.sheet-footer{padding:12px 22px 36px;flex-shrink:0;border-top:1px solid var(--line)}
.sheet-cta{width:100%;background:var(--red);border:none;padding:16px;font-family:var(--ff);font-size:20px;letter-spacing:.1em;color:#fff;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:space-between}
.sheet-cta:active{opacity:.8}
.sheet-cta:disabled{background:var(--card2);color:var(--dim);cursor:default}
.sheet-cta svg{width:14px;height:14px;stroke:#fff;flex-shrink:0}
.sheet-cta:disabled svg{stroke:var(--dim)}

/* STEP PROGRESS inside sheet */
.sheet-steps{display:flex;gap:3px;margin-bottom:16px}
.sstep{flex:1;height:2px;background:var(--dim);transition:background .3s}
.sstep.done{background:var(--sub)}
.sstep.now{background:var(--red)}

/* OPTION PILLS */
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-item{background:var(--card2);border:1px solid var(--line2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,background .15s}
.opt-item:active{background:var(--line)}
.opt-item.sel{border-color:var(--red);background:rgba(196,40,40,.06)}
.oi-left{flex:1}
.oi-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.oi-sub{font-size:11px;color:var(--sub)}
.oi-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px}
.oi-price{font-family:var(--fm);font-size:11px;color:var(--sub)}
.opt-item.sel .oi-price{color:var(--red)}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk svg{width:10px;height:10px;stroke:#fff;opacity:0;transition:opacity .15s}
.opt-item.sel .chk{background:var(--red);border-color:var(--red)}
.opt-item.sel .chk svg{opacity:1}

/* LIBRARY GRID */
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lib-card{background:var(--card2);border:1px solid var(--line2);cursor:pointer;transition:border-color .15s;overflow:hidden}
.lib-card:active{opacity:.8}
.lib-card.sel{border-color:var(--red)}
.lib-img{height:100px;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.lib-letter{font-family:var(--ff);font-size:56px;color:var(--line2)}
.lib-sel-mark{position:absolute;top:8px;right:8px;width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.lib-sel-mark svg{width:10px;height:10px;stroke:#fff}
.lib-card.sel .lib-sel-mark{opacity:1}
.lib-cbadge{position:absolute;top:8px;left:8px;background:var(--red);padding:2px 6px;font-family:var(--fm);font-size:7px;letter-spacing:.1em;color:#fff;text-transform:uppercase}
.lib-info{padding:10px 12px}
.lib-cname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.lib-cattrs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.lib-attr{font-family:var(--fm);font-size:8px;letter-spacing:.08em;color:var(--sub);border:1px solid var(--dim);padding:2px 6px}
.lib-cprice{font-family:var(--fm);font-size:10px;color:var(--red)}

/* BARBER OPTION */
.barber-opt{background:var(--card2);border:1px solid var(--line2);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.barber-opt.sel{border-color:var(--red);background:rgba(196,40,40,.06)}
.barber-opt:active{opacity:.8}
.bo-av{width:42px;height:42px;background:var(--bg);border:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:15px;color:var(--sub)}
.barber-opt.sel .bo-av{border-color:var(--red);color:var(--red)}
.bo-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.bo-sub{font-size:10px;color:var(--sub)}
.bo-rat{margin-left:auto;text-align:right;flex-shrink:0}
.bo-stars{font-family:var(--fm);font-size:12px;color:var(--red);font-weight:700}
.bo-sess{font-size:10px;color:var(--sub)}

/* DATE FIELDS */
.dt-row{background:var(--card2);border:1px solid var(--line2);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dt-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
input[type=date],input[type=text],select{background:transparent;border:none;outline:none;font-family:var(--fb);font-size:14px;font-weight:600;color:var(--text);text-align:right;-webkit-appearance:none;color-scheme:dark;max-width:60%}
input[type=text]::placeholder{color:var(--dim)}
select option{background:#1a1a1a;color:var(--text)}

/* RECEIPT */
.receipt{background:var(--card2);border:1px solid var(--line2)}
.receipt-hd{padding:14px 16px;border-bottom:1px solid var(--line);text-align:center}
.receipt-hd-txt{font-size:15px;font-weight:700;color:var(--text)}
.r-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line)}
.r-row:last-child{border-bottom:none}
.r-lbl{font-size:12px;color:var(--sub)}
.r-val{font-size:12px;font-weight:600;color:var(--text)}
.r-row.total-row{background:var(--card);padding:14px 16px}
.r-row.total-row .r-lbl{font-size:13px;font-weight:700;color:var(--text)}
.r-row.total-row .r-val{font-size:14px;font-weight:700;color:var(--red)}
.r-row.down-row{border-left:3px solid var(--red)}

/* CONFIRM */
.conf-id-box{background:var(--red-s);border:1px solid var(--red);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.conf-id-txt{font-family:var(--fm);font-size:10px;letter-spacing:.16em;color:var(--red);text-transform:uppercase}
.st-row{background:var(--card2);border:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
.st-row.active-st{border-left:3px solid var(--red)}
.st-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.st-row.active-st .st-dot{background:var(--red)}
.st-txt{font-size:12px;color:var(--sub)}
.st-row.active-st .st-txt{color:var(--text);font-weight:500}

/* INLINE TOPBAR for non-home screens */
.topbar{display:flex;align-items:center;padding:54px 22px 16px;flex-shrink:0}
.tb-back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:14px}
.tb-back:active{background:var(--line)}
.tb-back svg{width:14px;height:14px;stroke:var(--sub)}
.tb-title{font-size:16px;font-weight:700;color:var(--text)}

/* ADMIN */
.adm-scroll{flex:1;overflow-y:auto;padding:0 22px 20px}
.adm-scroll::-webkit-scrollbar{display:none}
.stat-row{display:flex;gap:6px;margin-bottom:6px}
.st-box{flex:1;background:var(--card);border:1px solid var(--line);padding:14px}
.st-n{font-family:var(--ff);font-size:28px;letter-spacing:.02em;line-height:1}
.st-n.red{color:var(--red)}
.st-l{font-family:var(--fm);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--sub);margin-top:5px}
.adm-sec{font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);padding:14px 0 8px}
.adm-card{background:var(--card);border:1px solid var(--line);padding:14px;margin-bottom:6px}
.adm-id{font-family:var(--fm);font-size:9px;letter-spacing:.12em;color:var(--sub);margin-bottom:4px;text-transform:uppercase}
.adm-name{font-size:14px;font-weight:700;color:var(--text)}
.adm-meta{font-size:11px;color:var(--sub);margin-top:2px}
.pill{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px}
.pill-p{background:rgba(180,120,0,.15);color:#c8900a}
.pill-c{background:rgba(30,120,60,.15);color:#3aaa6a}
.pill-a{background:var(--red-s);color:var(--red)}
.pill-r{background:rgba(50,50,50,.4);color:var(--sub)}
.adm-btns{display:flex;gap:6px;margin-top:10px}
.adm-ok{flex:1;padding:9px;border:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.adm-no{flex:1;padding:9px;border:1px solid var(--line2);background:var(--card2);color:var(--sub);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}

/* REG */
.reg-scroll{flex:1;overflow-y:auto;padding:0 22px 20px;display:flex;flex-direction:column;gap:6px}
.reg-scroll::-webkit-scrollbar{display:none}
.rf{background:var(--card);border:1px solid var(--line);padding:11px 14px;display:flex;flex-direction:column;gap:4px}
.rl{font-family:var(--fm);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--red)}
.ri{background:transparent;border:none;outline:none;font-family:var(--fb);font-size:15px;font-weight:500;color:var(--text);color-scheme:dark}
.ri::placeholder{color:var(--dim)}
.rs{background:transparent;border:none;outline:none;font-family:var(--fb);font-size:15px;font-weight:500;color:var(--text);-webkit-appearance:none;color-scheme:dark}
.rs option{background:#181818}
</style>
</head>
<body>
<div id="app">

<!-- ════ HOME ════ -->
<div class="scr active" id="s-home">
  <div class="home-scroll">
    <div class="home-nav">
      <div>
        <div class="home-mark"><span class="ast">*</span>INCOGNITOUP</div>
        <div class="home-mark-sub">Private hair systems, delivered to you.</div>
      </div>
      <div class="menu-btn" id="menu-btn"><span></span><span></span><span></span></div>
    </div>

    <div class="meta-strip">
      <div class="meta-item"><div class="meta-n">140+</div><div class="meta-l">Barbers</div></div>
      <div class="meta-item"><div class="meta-n">2.4k</div><div class="meta-l">Sessions</div></div>
      <div class="meta-item"><div class="meta-n">100%</div><div class="meta-l">Private</div></div>
    </div>

    <div class="sec"><span class="sec-lbl">Hair Systems</span><span class="sec-link" onclick="openSheet('system')">Browse all</span></div>
    <div class="hscroll" id="sys-hscroll"></div>

    <div class="sec" style="margin-top:8px"><span class="sec-lbl">Top Barbers</span></div>
    <div id="barber-list-home"></div>

    <div class="home-bottom">
      <button class="book-btn" onclick="openSheet('system')">
        <span>BOOK A SESSION</span>
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ════ ADMIN ════ -->
<div class="scr" id="s-admin">
  <div class="topbar">
    <div class="tb-back" onclick="goHome()"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="tb-title">Admin</div>
  </div>
  <div class="adm-scroll" id="adm-body"></div>
</div>

<!-- ════ BARBER REG ════ -->
<div class="scr" id="s-reg">
  <div class="topbar">
    <div class="tb-back" onclick="goHome()"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="tb-title">Join the Network</div>
  </div>
  <div style="padding:0 22px 10px;flex-shrink:0">
    <div style="font-family:var(--ff);font-size:36px;letter-spacing:.03em;color:var(--text);line-height:.9">JOIN THE<br>NETWORK.</div>
  </div>
  <div class="reg-scroll">
    <div class="rf"><div class="rl">Full Name</div><input class="ri" placeholder="Your name"/></div>
    <div class="rf"><div class="rl">Mobile</div><input class="ri" placeholder="+63 9XX XXX XXXX"/></div>
    <div class="rf"><div class="rl">Email</div><input class="ri" type="email" placeholder="you@email.com"/></div>
    <div class="rf"><div class="rl">Experience</div>
      <select class="rs"><option value="">—</option><option>1–2 yrs</option><option>3–5 yrs</option><option>5–10 yrs</option><option>10+ yrs</option></select></div>
    <div class="rf"><div class="rl">Specialty</div>
      <select class="rs"><option value="">—</option><option>Installation</option><option>Cut & Style</option><option>Both</option></select></div>
    <div class="rf"><div class="rl">Transport</div>
      <select class="rs"><option value="">—</option><option>Motorcycle</option><option>Car</option><option>Grab / Rideshare</option></select></div>
    <div class="rf"><div class="rl">Coverage Area</div><input class="ri" placeholder="Makati, BGC, Pasig…"/></div>
  </div>
  <div style="padding:12px 22px 36px;flex-shrink:0">
    <button style="width:100%;background:var(--red);border:none;padding:16px;font-family:var(--ff);font-size:20px;letter-spacing:.1em;color:#fff;cursor:pointer" onclick="alert('Application submitted. We\'ll contact you within 48 hours.');goHome()">SUBMIT APPLICATION</button>
  </div>
</div>

<!-- ════ SHEET OVERLAY ════ -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- ════ BOTTOM SHEET ════ -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-eyebrow" id="sh-eyebrow">Hair System</div>
    <div class="sheet-title" id="sh-title">WHAT DO<br>YOU NEED.</div>
    <!-- step dots -->
    <div style="display:flex;gap:4px;margin-top:12px" id="sh-dots"></div>
  </div>
  <div class="sheet-body" id="sh-body"></div>
  <div class="sheet-footer">
    <button class="sheet-cta" id="sh-cta" onclick="sheetNext()" disabled>
      <span id="sh-cta-txt">NEXT</span>
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

</div>
<script>
// ══ DATA ══
const SYSTEMS=[
  {id:1,name:'The Executive',style:'Classic Slick',color:'Jet Black',base:'Full Lace',size:'Medium',price:8500,badge:'BESTSELLER',letter:'E'},
  {id:2,name:'The Sovereign',style:'Natural Wave',color:'Dark Brown',base:'Swiss Lace',size:'Large',price:12000,badge:'PREMIUM',letter:'S'},
  {id:3,name:'The Proxy',style:'Textured Fade',color:'Salt & Pepper',base:'Poly Skin',size:'Small',price:6800,badge:'',letter:'P'},
  {id:4,name:'The Cipher',style:'Straight',color:'Medium Brown',base:'French Lace',size:'Medium',price:9200,badge:'NEW',letter:'C'},
  {id:5,name:'The Atlas',style:'Curly / Coily',color:'Natural Black',base:'Full Lace',size:'Large',price:11500,badge:'',letter:'A'},
  {id:6,name:'The Stealth',style:'Thin Skin',color:'Custom',base:'0.03mm Poly',size:'Medium',price:7400,badge:'',letter:'T'},
  {id:7,name:'The Signal',style:'Side Part',color:'Light Brown',base:'Mono Crown',size:'Medium',price:8900,badge:'',letter:'SI'},
  {id:8,name:'The Ghost',style:'Buzz Cut Look',color:'Dark Blonde',base:'Skin Base',size:'Small',price:6200,badge:'',letter:'G'},
];
const SERVICES=[
  {id:'install',name:'Installation',sub:'Fitting, bonding, initial style',price:2500,dur:'2–3 hrs'},
  {id:'cut',name:'Cut & Style',sub:'Trim, blend, finish',price:1200,dur:'1 hr'},
  {id:'maint',name:'Maintenance',sub:'Clean, reattach, touch-up',price:1800,dur:'1.5 hrs'},
  {id:'full',name:'Full Package',sub:'System + install + cut + style',price:4500,dur:'3–4 hrs'},
  {id:'removal',name:'Removal',sub:'Safe removal with scalp care',price:900,dur:'45 min'},
];
const BARBERS=[
  {id:1,name:'Marco Reyes',sub:'8 yrs · Installation · Moto',rating:'4.9',sess:'72',init:'MR'},
  {id:2,name:'Dean Villanueva',sub:'6 yrs · Cut & Blend · Car',rating:'4.8',sess:'58',init:'DV'},
  {id:3,name:'Carlos Ignacio',sub:'12 yrs · Full System · Car',rating:'5.0',sess:'89',init:'CI'},
  {id:4,name:'Rafael Santos',sub:'4 yrs · Maintenance · Moto',rating:'4.7',sess:'41',init:'RS'},
];
const BOOKINGS=[
  {id:'ITP-14892',name:'A. DELA CRUZ',svc:'Full Package',date:'May 3',status:'pending',total:13500},
  {id:'ITP-14891',name:'R. BONDOC',svc:'Installation',date:'May 2',status:'confirmed',total:14500},
  {id:'ITP-14890',name:'J. LIM',svc:'Maintenance',date:'May 1',status:'awaiting',total:8600},
  {id:'ITP-14889',name:'M. CRUZ',svc:'Cut & Style',date:'Apr 30',status:'confirmed',total:10400},
  {id:'ITP-14888',name:'P. SANTOS',svc:'Full Package',date:'Apr 28',status:'rejected',total:16000},
];

// ══ STATE ══
const B={system:null,service:null,date:'',time:'',loc:'',addr:'',barber:null};
let sheetStep=0; // 0=system-library 1=service 2=datetime 3=barber 4=summary 5=confirm
const STEPS=5;

// ══ SCREEN NAV ══
let curScr='s-home';
function showScr(id){
  const from=document.getElementById(curScr);
  const to=document.getElementById(id);
  from.classList.add('out');
  from.classList.remove('active');
  to.classList.add('active');
  curScr=id;
  setTimeout(()=>from.classList.remove('out'),360);
}
function goHome(){
  document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('active','out');s.style.transform='';});
  document.getElementById('s-home').classList.add('active');
  curScr='s-home';
  closeSheet();
}

// ══ SHEET ══
function openSheet(startStep){
  sheetStep= startStep==='system'?0:0;
  renderSheet();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('open');
}

function setSheetCta(enabled,txt){
  const btn=document.getElementById('sh-cta');
  btn.disabled=!enabled;
  document.getElementById('sh-cta-txt').textContent=txt||'NEXT';
}

function renderDots(){
  const c=document.getElementById('sh-dots');
  c.innerHTML='';
  for(let i=0;i<STEPS;i++){
    const d=document.createElement('div');
    d.style.cssText=`height:2px;flex:1;border-radius:1px;background:${i<sheetStep?'var(--sub)':i===sheetStep?'var(--red)':'var(--dim)'};transition:background .3s`;
    c.appendChild(d);
  }
}

function renderSheet(){
  const ey=document.getElementById('sh-eyebrow');
  const tt=document.getElementById('sh-title');
  const bd=document.getElementById('sh-body');
  renderDots();

  if(sheetStep===0){
    ey.textContent='Step 1 of 5 — Hair System';
    tt.innerHTML='PICK YOUR<br>SYSTEM.';
    bd.innerHTML='<div class="lib-grid" id="lib-grid"></div>';
    const g=document.getElementById('lib-grid');
    SYSTEMS.forEach(s=>{
      const c=document.createElement('div');
      c.className='lib-card'+(B.system?.id===s.id?' sel':'');
      c.innerHTML=`<div class="lib-img">
        <div class="lib-letter">${s.letter}</div>
        ${s.badge?`<div class="lib-cbadge">${s.badge}</div>`:''}
        <div class="lib-sel-mark"><svg fill="none" viewBox="0 0 24 24" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div>
      </div>
      <div class="lib-info">
        <div class="lib-cname">${s.name}</div>
        <div class="lib-cattrs"><span class="lib-attr">${s.style}</span><span class="lib-attr">${s.color}</span><span class="lib-attr">${s.base}</span></div>
        <div class="lib-cprice">₱${s.price.toLocaleString()}</div>
      </div>`;
      c.onclick=()=>{
        B.system=s;
        document.querySelectorAll('.lib-card').forEach(x=>x.classList.remove('sel'));
        c.classList.add('sel');
        setSheetCta(true,'NEXT');
      };
      g.appendChild(c);
    });
    setSheetCta(!!B.system,'NEXT');

  } else if(sheetStep===1){
    ey.textContent='Step 2 of 5 — Service';
    tt.innerHTML='YOUR<br>SERVICE.';
    bd.innerHTML='<div class="opt-list" id="opt-svc"></div>';
    const c=document.getElementById('opt-svc');
    SERVICES.forEach(sv=>{
      const d=document.createElement('div');
      d.className='opt-item'+(B.service?.id===sv.id?' sel':'');
      d.innerHTML=`<div class="oi-left"><div class="oi-name">${sv.name}</div><div class="oi-sub">${sv.sub} · ${sv.dur}</div></div>
      <div class="oi-right"><span class="oi-price">₱${sv.price.toLocaleString()}</span>
      <div class="chk"><svg fill="none" viewBox="0 0 24 24" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div></div>`;
      d.onclick=()=>{
        B.service=sv;
        c.querySelectorAll('.opt-item').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        setSheetCta(true,'NEXT');
      };
      c.appendChild(d);
    });
    setSheetCta(!!B.service,'NEXT');

  } else if(sheetStep===2){
    ey.textContent='Step 3 of 5 — Schedule';
    tt.innerHTML='WHEN &<br>WHERE.';
    bd.innerHTML=`
      <div class="dt-row"><span class="dt-lbl">Date</span><input type="date" id="i-date" value="${B.date}" oninput="B.date=this.value;chkDT()"/></div>
      <div class="dt-row"><span class="dt-lbl">Time</span>
        <select id="i-time" onchange="B.time=this.value;chkDT()">
          <option value="">Select time</option>
          <option ${B.time=='9:00 AM'?'selected':''}>9:00 AM</option>
          <option ${B.time=='10:00 AM'?'selected':''}>10:00 AM</option>
          <option ${B.time=='11:00 AM'?'selected':''}>11:00 AM</option>
          <option ${B.time=='1:00 PM'?'selected':''}>1:00 PM</option>
          <option ${B.time=='2:00 PM'?'selected':''}>2:00 PM</option>
          <option ${B.time=='3:00 PM'?'selected':''}>3:00 PM</option>
          <option ${B.time=='4:00 PM'?'selected':''}>4:00 PM</option>
          <option ${B.time=='5:00 PM'?'selected':''}>5:00 PM</option>
        </select>
      </div>
      <div class="dt-row"><span class="dt-lbl">Location</span>
        <select id="i-loc" onchange="B.loc=this.value;chkDT()">
          <option value="">Select</option>
          <option ${B.loc=='Home'?'selected':''}>Home</option>
          <option ${B.loc=='Hotel'?'selected':''}>Hotel</option>
          <option ${B.loc=='Office'?'selected':''}>Office</option>
          <option ${B.loc=='Event'?'selected':''}>Event</option>
        </select>
      </div>
      <div class="dt-row"><span class="dt-lbl">Address</span>
        <input type="text" id="i-addr" placeholder="Enter address" value="${B.addr}" oninput="B.addr=this.value;chkDT()"/>
      </div>`;
    setSheetCta(!!(B.date&&B.time&&B.loc&&B.addr),'NEXT');

  } else if(sheetStep===3){
    ey.textContent='Step 4 of 5 — Barber';
    tt.innerHTML='YOUR<br>BARBER.';
    bd.innerHTML='<div id="barber-opts"></div>';
    const c=document.getElementById('barber-opts');
    BARBERS.forEach(br=>{
      const d=document.createElement('div');
      d.className='barber-opt'+(B.barber?.id===br.id?' sel':'');
      d.innerHTML=`<div class="bo-av">${br.init}</div>
      <div><div class="bo-name">${br.name}</div><div class="bo-sub">${br.sub}</div></div>
      <div class="bo-rat"><div class="bo-stars">★ ${br.rating}</div><div class="bo-sess">${br.sess} sessions</div></div>`;
      d.onclick=()=>{
        B.barber=br;
        c.querySelectorAll('.barber-opt').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        setSheetCta(true,'REVIEW');
      };
      c.appendChild(d);
    });
    setSheetCta(!!B.barber,'REVIEW');

  } else if(sheetStep===4){
    ey.textContent='Step 5 of 5 — Review';
    tt.innerHTML='YOUR<br>BOOKING.';
    const sys=B.system?.price||0;
    const svc=B.service?.price||0;
    const bar=500;
    const total=sys+svc+bar;
    const down=Math.round(total*.5);
    bd.innerHTML=`<div class="receipt">
      <div class="receipt-hd"><div class="receipt-hd-txt">Receipt</div></div>
      <div class="r-row"><span class="r-lbl">Hair System</span><span class="r-val">${B.system?.name||'—'}</span></div>
      <div class="r-row"><span class="r-lbl">System Price</span><span class="r-val">₱${sys.toLocaleString()}</span></div>
      <div class="r-row"><span class="r-lbl">Service</span><span class="r-val">${B.service?.name||'—'}</span></div>
      <div class="r-row"><span class="r-lbl">Service Fee</span><span class="r-val">₱${svc.toLocaleString()}</span></div>
      <div class="r-row"><span class="r-lbl">Barber</span><span class="r-val">${B.barber?.name||'—'}</span></div>
      <div class="r-row"><span class="r-lbl">Barber Fee</span><span class="r-val">₱500</span></div>
      <div class="r-row"><span class="r-lbl">Date & Time</span><span class="r-val">${B.date} ${B.time}</span></div>
      <div class="r-row"><span class="r-lbl">Location</span><span class="r-val">${B.loc}</span></div>
      <div class="r-row total-row"><span class="r-lbl">Total Cost</span><span class="r-val">₱${total.toLocaleString()}</span></div>
      <div class="r-row down-row"><span class="r-lbl">50% Downpayment</span><span class="r-val" style="color:var(--red)">₱${down.toLocaleString()}</span></div>
    </div>`;
    setSheetCta(true,'CONFIRM BOOKING');
  }
}

function chkDT(){
  setSheetCta(!!(B.date&&B.time&&B.loc&&B.addr),'NEXT');
}

function sheetNext(){
  if(sheetStep<4){
    sheetStep++;
    renderSheet();
    document.getElementById('sh-body').scrollTop=0;
  } else {
    // confirm
    closeSheet();
    const id='ITP-'+Math.floor(Math.random()*90000+10000);
    showConfirm(id);
  }
}

// ══ CONFIRM OVERLAY ══
function showConfirm(bookingId){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:var(--bg);z-index:80;display:flex;flex-direction:column;animation:fadeIn .3s ease';
  ov.innerHTML=`<style>@keyframes fadeIn{from{opacity:0}to{opacity:1}}</style>
  <div style="padding:54px 24px 0;display:flex;align-items:center;gap:14px">
    <div style="font-family:var(--ff);font-size:clamp(36px,10vw,52px);letter-spacing:.04em;line-height:.9"><span style="color:var(--red)">*</span>INCOGNITOUP</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:28px 24px 12px">
    <div class="conf-id-box"><span class="conf-id-txt">${bookingId}</span><span style="font-family:var(--fm);font-size:9px;color:var(--red);letter-spacing:.12em">SUBMITTED</span></div>
    <div style="font-family:var(--fm);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub);margin-bottom:12px">Booking Status</div>
    <div class="st-row active-st"><div class="st-dot"></div><span class="st-txt">Pending admin approval</span></div>
    <div class="st-row"><div class="st-dot"></div><span class="st-txt">Barber assigned & notified</span></div>
    <div class="st-row"><div class="st-dot"></div><span class="st-txt">Awaiting 50% downpayment</span></div>
    <div class="st-row"><div class="st-dot"></div><span class="st-txt">Booking confirmed</span></div>
  </div>
  <div style="padding:14px 24px 40px">
    <button style="width:100%;background:var(--red);border:none;padding:16px;font-family:var(--ff);font-size:20px;letter-spacing:.1em;color:#fff;cursor:pointer" onclick="this.closest('[style]').remove()">DONE</button>
  </div>`;
  document.getElementById('app').appendChild(ov);
}

// ══ HOME RENDER ══
(function initHome(){
  // horizontal sys scroll
  const hsc=document.getElementById('sys-hscroll');
  SYSTEMS.forEach(s=>{
    const c=document.createElement('div');
    c.className='sys-card';
    c.innerHTML=`<div class="sys-card-img">
      <div class="sys-card-letter">${s.letter}</div>
      ${s.badge?`<div class="sys-badge">${s.badge}</div>`:''}
    </div>
    <div class="sys-card-body">
      <div class="sys-cname">${s.name}</div>
      <div class="sys-cprice">₱${s.price.toLocaleString()}</div>
    </div>`;
    c.onclick=()=>{B.system=s;sheetStep=1;openSheet();};
    hsc.appendChild(c);
  });

  // barber list
  const bl=document.getElementById('barber-list-home');
  BARBERS.slice(0,3).forEach(b=>{
    const r=document.createElement('div');
    r.className='b-row';
    r.innerHTML=`<div class="b-av">${b.init}</div>
    <div class="b-info"><div class="b-name">${b.name}</div><div class="b-meta">${b.sub}</div></div>
    <div class="b-rat"><div><span class="star">★</span> ${b.rating}</div><div style="font-size:10px;color:var(--sub)">${b.sess} sessions</div></div>`;
    r.onclick=()=>{B.barber=b;sheetStep=0;openSheet();};
    bl.appendChild(r);
  });
})();

// ══ ADMIN ══
function renderAdmin(){
  document.getElementById('adm-body').innerHTML=`
    <div class="stat-row">
      <div class="st-box"><div class="st-n red">7</div><div class="st-l">Pending</div></div>
      <div class="st-box"><div class="st-n">28</div><div class="st-l">Barbers</div></div>
      <div class="st-box"><div class="st-n">148</div><div class="st-l">Bookings</div></div>
    </div>
    <div class="adm-sec">Bookings</div>
    ${BOOKINGS.map(b=>`
      <div class="adm-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div><div class="adm-id">${b.id} · ${b.date}</div><div class="adm-name">${b.name}</div><div class="adm-meta">${b.svc} · ₱${b.total.toLocaleString()}</div></div>
          <span class="pill pill-${b.status.charAt(0)}">${b.status.toUpperCase()}</span>
        </div>
        ${b.status==='pending'?`<div class="adm-btns"><button class="adm-ok" onclick="appr('${b.id}')">APPROVE</button><button class="adm-no" onclick="rejt('${b.id}')">REJECT</button></div>`:''}
      </div>`).join('')}
    <div class="adm-sec">Network</div>
    <div class="adm-card" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showScr('s-reg')">
      <div><div class="adm-name">Barber Applications</div><div class="adm-meta">3 pending review</div></div>
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="var(--sub)"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>`;
}
function appr(id){const b=BOOKINGS.find(x=>x.id===id);if(b){b.status='awaiting';renderAdmin();}}
function rejt(id){const b=BOOKINGS.find(x=>x.id===id);if(b){b.status='rejected';renderAdmin();}}

// ══ SECRET ADMIN ══
let ht,hf=false;
const home=document.getElementById('s-home');
function startHold(){hf=false;ht=setTimeout(()=>{hf=true;renderAdmin();showScr('s-admin');},1800);}
function endHold(){clearTimeout(ht);}
document.getElementById('menu-btn').addEventListener('click',()=>{renderAdmin();showScr('s-admin');});
if(location.hash==='#admin'){setTimeout(()=>{renderAdmin();showScr('s-admin');},100);}
if(location.hash==='#barber'){setTimeout(()=>showScr('s-reg'),100);}
</script>
